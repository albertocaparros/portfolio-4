# Deploy static Astro site to GitHub Pages (artifact + deploy-pages).
#
# Required once per repo: Settings → Pages → Build and deployment → Source:
# select "GitHub Actions" (not "Deploy from a branch"). Otherwise deploy-pages
# fails with HttpError 404 when creating the deployment.
#
# https://docs.github.com/en/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install, build, and upload site
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
